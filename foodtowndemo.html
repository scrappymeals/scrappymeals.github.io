<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foodtown × Fridgie Smalls — Concept Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #5B21B6; font-family: 'DM Sans', sans-serif; overflow: hidden; height: 100%; width: 100%; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-4px); } }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FRIDGIE_SRC = "fridgieDemo.png";

    const STEPS = [
      {
        num: "STEP 1 OF 6",
        title: "Customer scans a product in Foodtown.",
        body: "A QR code on the shelf or package opens a recipe instantly. No app download needed.",
        cards: [
          { icon: "🍝", label: "Pastosa Large Round Cheese Ravioli", sub: "12 count · A Brooklyn Tradition Since 1966" },
          { icon: "📱", label: "Scan QR on shelf", sub: "Customer points their camera at the QR code next to the product." },
        ],
        phone: { title: "Scan to cook", body: "Point your camera at any QR code near a Foodtown product.", visual: "scan" },
      },
      {
        num: "STEP 2 OF 6",
        title: "Fridgie builds a recipe instantly.",
        body: "The AI uses the scanned product as the hero ingredient and generates a full recipe in seconds.",
        cards: [
          { icon: "⚡", label: "Recipe generating…", sub: "AI builds from the scanned product outward." },
          { icon: "🧠", label: "Smart pairing", sub: "Ingredients chosen from pantry staples and flavor profiles." },
        ],
        phone: { title: "Building your recipe…", body: "Matching ingredients, steps, and buy links.", visual: "building" },
      },
      {
        num: "STEP 3 OF 6",
        title: "Recipe opens on the shopper's phone.",
        body: "Full recipe — title, ingredients, and instructions — loads instantly in the browser.",
        cards: [
          { icon: "📋", label: "Simple Ravioli in Tomato Cream Sauce", sub: "5 ingredients · 3 steps · 20 min" },
          { icon: "🔗", label: "Embedded buy links", sub: "Every ingredient links back to its Foodtown product page." },
        ],
        phone: { title: "Simple Ravioli in Tomato Cream Sauce", body: null, visual: "recipe" },
      },
      {
        num: "STEP 4 OF 6",
        title: "Shopper saves the recipe to Fridgie.",
        body: "One tap saves it permanently — with the buy button embedded every single time they open it.",
        cards: [
          { icon: "🧊", label: "Saved to Fridgie vault", sub: "Recipe lives in the app with buy button intact." },
          { icon: "🔁", label: "Repeat purchase loop", sub: "Every future cook session starts with a Foodtown buy button." },
        ],
        phone: { title: "Recipe lives in Fridgie.", body: "Saved to your Fridgie · 5 ingredients", visual: "saved" },
      },
      {
        num: "STEP 5 OF 6",
        title: "Customer taps to buy ingredients.",
        body: "One tap from the recipe sends them straight to the Foodtown product page to add it to their cart.",
        cards: [
          { icon: "🛒", label: "Add to cart — one tap", sub: "Product page pre-loaded from the recipe ingredient link." },
          { icon: "📦", label: "Multi-SKU basket pull", sub: "One recipe = 4–5 ingredient purchases per cook session." },
        ],
        phone: { title: "Large Round Cheese Ravioli", body: "$11.45 · 12 count · Add to Cart", visual: "buy" },
      },
      {
        num: "STEP 6 OF 6",
        title: "Customer buys from Foodtown.",
        body: "One tap from the recipe takes them straight to the product page to add it to their cart.",
        cards: [
          { icon: "✅", label: "Purchase complete", sub: "Item added to Foodtown cart from the recipe." },
          { icon: "📈", label: "Sales loop activated", sub: "Customer returns to the same recipe — and buys again." },
        ],
        phone: { title: "Order placed.", body: "12 Large Round Cheese Ravioli · Foodtown", visual: "done" },
      },
    ];

    function PhoneScreen({ step, visible }) {
      const p = STEPS[step].phone;
      const s = {
        flex: 1, background: "#f8f4ff", borderRadius: 14,
        padding: "20px 20px 24px", display: "flex", flexDirection: "column", gap: 14,
        overflow: "hidden",
        opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(6px)",
        transition: "opacity 0.28s ease, transform 0.28s ease",
      };
      const dots = (
        <div style={{ display: "flex", gap: 5, justifyContent: "center", marginBottom: 4 }}>
          {[...Array(6)].map((_, i) => (
            <div key={i} style={{ width: i <= step ? 28 : 10, height: 6, borderRadius: 10, background: i <= step ? "#7C3AED" : "#DDD6FE", transition: "width 0.3s ease" }} />
          ))}
        </div>
      );
      if (p.visual === "scan") return (
        <div style={s}>{dots}
          <div style={{ fontSize: 22, fontWeight: 800, color: "#1A0A2E" }}>{p.title}</div>
          <div style={{ fontSize: 16, color: "#6B5A8A", lineHeight: 1.5 }}>{p.body}</div>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, background: "#EDE9FE", borderRadius: 14 }}>
            <div style={{ fontSize: 72 }}>📷</div>
            <div style={{ width: 140, height: 140, border: "4px solid #7C3AED", borderRadius: 14, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, padding: 12, background: "#fff" }}>
              {[...Array(9)].map((_, i) => <div key={i} style={{ background: i % 3 === 0 || i === 4 ? "#7C3AED" : "#DDD6FE", borderRadius: 4 }} />)}
            </div>
            <div style={{ fontSize: 18, color: "#7C3AED", fontWeight: 700 }}>SCAN QR CODE</div>
          </div>
        </div>
      );
      if (p.visual === "building") return (
        <div style={s}>{dots}
          <div style={{ fontSize: 22, fontWeight: 800, color: "#1A0A2E" }}>{p.title}</div>
          <div style={{ fontSize: 16, color: "#6B5A8A" }}>{p.body}</div>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 20 }}>
            <div style={{ width: 80, height: 80, borderRadius: "50%", border: "5px solid #DDD6FE", borderTopColor: "#7C3AED", animation: "spin 1s linear infinite" }} />
            <div style={{ display: "flex", gap: 12 }}>
              {["🍝","🍅","🥛","🫒","🧄"].map((e, i) => <span key={i} style={{ fontSize: 36, animation: `bounce 0.6s ${i * 0.1}s infinite alternate` }}>{e}</span>)}
            </div>
          </div>
        </div>
      );
      if (p.visual === "recipe") return (
        <div style={s}>{dots}
          <div style={{ fontSize: 20, fontWeight: 800, color: "#1A0A2E", lineHeight: 1.3 }}>{p.title}</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#7C3AED", letterSpacing: "0.1em", textTransform: "uppercase" }}>Ingredients</div>
          {[["🍝","1 pack Pastosa ravioli"],["🍅","1 can diced tomatoes"],["🥛","½ cup heavy cream"],["🫒","2 tbsp olive oil"],["🧄","3 cloves garlic"]].map(([ic,tx],i) => (
            <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", fontSize: 16, color: "#2D1B4E", borderBottom: i < 4 ? "1px solid #EDE9FE" : "none", paddingBottom: 6 }}><span style={{ fontSize: 18 }}>{ic}</span>{tx}</div>
          ))}
          <div style={{ fontSize: 14, fontWeight: 700, color: "#7C3AED", letterSpacing: "0.1em", textTransform: "uppercase", marginTop: 4 }}>Instructions</div>
          {["Boil salted water. Cook ravioli per package.","Heat oil. Add garlic and sauté until fragrant.","Add tomatoes, simmer 5 min. Stir in cream."].map((st,i) => (
            <div key={i} style={{ display: "flex", gap: 8, fontSize: 15, color: "#2D1B4E", lineHeight: 1.4 }}>
              <span style={{ width: 24, height: 24, background: "#7C3AED", color: "#fff", borderRadius: "50%", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{i+1}</span>{st}
            </div>
          ))}
        </div>
      );
      if (p.visual === "saved") return (
        <div style={s}>{dots}
          <div style={{ fontSize: 20, fontWeight: 800, color: "#1A0A2E" }}>{p.title}</div>
          <div style={{ fontSize: 16, color: "#6B5A8A" }}>{p.body}</div>
          <div style={{ background: "#EDE9FE", borderRadius: 14, padding: "14px 16px" }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#1A0A2E", marginBottom: 6 }}>Simple Ravioli in Tomato Cream Sauce</div>
            <div style={{ fontSize: 13, color: "#7C3AED", marginBottom: 10 }}>PASTOSA · FOODTOWN</div>
            <div style={{ display: "flex", gap: 10, alignItems: "center", background: "#fff", borderRadius: 10, padding: "10px 12px" }}>
              <span style={{ fontSize: 32 }}>🍝</span>
              <div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#1A0A2E" }}>12 Large Round Cheese Ravioli</div>
                <div style={{ fontSize: 14, color: "#22C55E", fontWeight: 700 }}>Tap to buy ›</div>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: "auto" }}>
            {["Save to Fridgie","Add Recipe","Copy Recipe"].map((l,i) => (
              <button key={l} style={{ flex: 1, padding: "10px 6px", borderRadius: 10, border: "none", background: i===0?"#7C3AED":i===1?"#22C55E":"#3B82F6", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>{l}</button>
            ))}
          </div>
        </div>
      );
      if (p.visual === "buy") return (
        <div style={s}>{dots}
          <div style={{ background: "#fff", borderRadius: 16, padding: "16px 18px", display: "flex", gap: 14, alignItems: "center", boxShadow: "0 2px 12px rgba(0,0,0,0.08)" }}>
            <span style={{ fontSize: 52 }}>🍝</span>
            <div>
              <div style={{ fontSize: 13, color: "#7C3AED", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>PASTOSA · A BROOKLYN TRADITION SINCE 1966</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: "#1A0A2E", margin: "4px 0" }}>{p.title}</div>
              <div style={{ fontSize: 28, fontWeight: 800, color: "#22C55E" }}>$11.45</div>
              <div style={{ fontSize: 13, color: "#6B5A8A" }}>12 count · 15oz · Made fresh daily.</div>
            </div>
          </div>
          <button style={{ width: "100%", padding: "18px", borderRadius: 14, border: "none", background: "#EF4444", color: "#fff", fontWeight: 800, fontSize: 22, cursor: "pointer" }}>Add to Cart</button>
        </div>
      );
      return (
        <div style={s}>{dots}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
            <div style={{ fontSize: 72 }}>✅</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: "#1A0A2E", textAlign: "center" }}>{p.title}</div>
            <div style={{ fontSize: 18, color: "#6B5A8A", textAlign: "center" }}>{p.body}</div>
            <div style={{ background: "#EDE9FE", borderRadius: 14, padding: "14px 24px", textAlign: "center" }}>
              <div style={{ fontSize: 16, color: "#7C3AED", fontWeight: 700 }}>Order confirmed · Foodtown</div>
            </div>
          </div>
        </div>
      );
    }

    function HoverCard({ children, style = {}, onClick }) {
      const [hov, setHov] = useState(false);
      return (
        <div
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} onClick={onClick}
          style={{ transition: "transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease", transform: hov ? "translateY(-2px)" : "translateY(0)", filter: hov ? "brightness(1.12)" : "brightness(1)", boxShadow: hov ? "0 8px 32px rgba(124,58,237,0.22)" : "none", cursor: onClick ? "pointer" : "default", ...style }}
        >{children}</div>
      );
    }

    function ScaleWrapper({ children }) {
      const [scale, setScale] = useState(1);
      useEffect(() => {
        const calc = () => setScale(Math.min(window.innerWidth / 1440, window.innerHeight / 900));
        calc();
        window.addEventListener("resize", calc);
        return () => window.removeEventListener("resize", calc);
      }, []);
      return (
        <div style={{ width: "100vw", height: "100vh", overflow: "hidden", background: "#5B21B6", position: "relative" }}>
          <div style={{ width: 1440, height: 900, transform: `scale(${scale})`, transformOrigin: "top left", position: "absolute", top: 0, left: 0 }}>
            {children}
          </div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [visible, setVisible] = useState(true);

      const changeStep = (i) => {
        if (i === step) return;
        setVisible(false);
        setTimeout(() => { setStep(i); setVisible(true); }, 200);
      };

      const s = STEPS[step];

      return (
        <ScaleWrapper>
          <div style={{ width: 1440, height: 900, background: "#5B21B6", display: "grid", gridTemplateColumns: "220px 1fr 240px", gridTemplateRows: "28px 1fr", gap: 14, padding: "14px 32px 18px", overflow: "hidden" }}>

            {/* Top label */}
            <div style={{ gridColumn: "1 / 4", display: "flex", alignItems: "center" }}>
              <span style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", letterSpacing: "0.12em", textTransform: "uppercase", fontWeight: 600 }}>Concept Demo · Foodtown</span>
            </div>

            {/* COL 1: Headline + Fridgie + blurb */}
            <div style={{ display: "flex", flexDirection: "column", gap: 12, minHeight: 0, overflow: "hidden" }}>
              <h1 style={{ fontFamily: "'Sora', sans-serif", fontWeight: 900, fontSize: 24, lineHeight: 1.2, color: "#fff", letterSpacing: "-0.02em", flexShrink: 0 }}>
                Turn every product into a recipe.
              </h1>
              <div style={{ flex: 1, borderRadius: 16, overflow: "hidden", position: "relative", minHeight: 0 }}>
                <div style={{ width: "100%", height: "100%", background: "linear-gradient(170deg, rgba(124,58,237,0.3) 0%, rgba(88,28,220,0.12) 100%)", borderRadius: 16, overflow: "hidden", position: "relative", display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
                  <div style={{ position: "absolute", bottom: "10%", left: "50%", transform: "translateX(-50%)", width: 160, height: 160, borderRadius: "50%", background: "radial-gradient(circle, rgba(167,139,250,0.45) 0%, transparent 70%)", pointerEvents: "none" }} />
                  <img src={FRIDGIE_SRC} alt="Fridgie" style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "center 10%", display: "block", position: "relative", zIndex: 1 }} />
                </div>
              </div>
              <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 12, padding: "12px 14px", flexShrink: 0 }}>
                <p style={{ fontSize: 11, color: "rgba(255,255,255,0.72)", lineHeight: 1.65, margin: 0 }}>
                  FridgieSmalls helps Foodtown customers discover meals instantly by scanning products in-store — driving more sales.
                </p>
              </div>
            </div>

            {/* COL 2: Step flow + phone below */}
            <div style={{ display: "flex", flexDirection: "column", gap: 10, minHeight: 0, overflow: "hidden" }}>

              {/* Step content */}
              <div style={{ display: "flex", flexDirection: "column", gap: 10, minHeight: 0 }}>
                <div style={{ display: "flex", gap: 6, alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  {STEPS.map((_, i) => (
                    <button key={i} onClick={() => changeStep(i)} style={{ width: i === step ? 28 : 10, height: 10, borderRadius: 10, border: "none", background: i === step ? "#fff" : "rgba(255,255,255,0.3)", cursor: "pointer", transition: "width 0.25s ease, background 0.25s ease", padding: 0 }} />
                  ))}
                </div>
                <div style={{ opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(8px)", transition: "opacity 0.22s ease, transform 0.22s ease", flexShrink: 0 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.5)", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 6 }}>{s.num}</div>
                  <h2 style={{ fontFamily: "'Sora', sans-serif", fontWeight: 800, fontSize: 20, color: "#fff", lineHeight: 1.25, marginBottom: 8, letterSpacing: "-0.02em" }}>{s.title}</h2>
                  <p style={{ fontSize: 13, color: "rgba(255,255,255,0.7)", lineHeight: 1.6 }}>{s.body}</p>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10, flexShrink: 0, opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(8px)", transition: "opacity 0.28s ease 0.06s, transform 0.28s ease 0.06s" }}>
                  {s.cards.map((c, i) => (
                    <HoverCard key={i} style={{ borderRadius: 14 }}>
                      <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 14, padding: "14px 16px", display: "flex", gap: 14, alignItems: "center" }}>
                        <span style={{ fontSize: 20, width: 40, height: 40, borderRadius: 10, background: "rgba(255,255,255,0.12)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{c.icon}</span>
                        <div>
                          <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 3 }}>{c.label}</div>
                          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)" }}>{c.sub}</div>
                        </div>
                      </div>
                    </HoverCard>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                  <button onClick={() => changeStep(Math.max(0, step - 1))} disabled={step === 0} style={{ flex: 1, padding: "9px 0", borderRadius: 10, border: "1px solid rgba(255,255,255,0.25)", background: "transparent", color: step === 0 ? "rgba(255,255,255,0.3)" : "#fff", fontFamily: "'DM Sans', sans-serif", fontWeight: 600, fontSize: 12, cursor: step === 0 ? "default" : "pointer" }}>← Prev</button>
                  <button onClick={() => changeStep(Math.min(5, step + 1))} disabled={step === 5} style={{ flex: 1, padding: "9px 0", borderRadius: 10, border: "1px solid rgba(255,255,255,0.35)", background: step === 5 ? "transparent" : "rgba(255,255,255,0.15)", color: step === 5 ? "rgba(255,255,255,0.3)" : "#fff", fontFamily: "'DM Sans', sans-serif", fontWeight: 600, fontSize: 12, cursor: step === 5 ? "default" : "pointer" }}>Next →</button>
                </div>
              </div>

              {/* Phone */}
              <HoverCard style={{ borderRadius: 28, flex: 1, minHeight: 0 }}>
                <div style={{ background: "#fff", borderRadius: 28, padding: "12px 10px", boxShadow: "0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.2)", height: "100%", display: "flex", flexDirection: "column", overflow: "hidden" }}>
                  <div style={{ display: "flex", justifyContent: "center", marginBottom: 8, flexShrink: 0 }}>
                    <div style={{ width: 56, height: 5, borderRadius: 10, background: "#E5E7EB" }} />
                  </div>
                  <PhoneScreen step={step} visible={visible} />
                </div>
              </HoverCard>

            </div>

            {/* COL 3: Right rail */}
            <div style={{ display: "flex", flexDirection: "column", gap: 10, minHeight: 0, overflow: "hidden" }}>

              <HoverCard style={{ borderRadius: 14, flexShrink: 0 }}>
                <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 14, padding: "13px 14px" }}>
                  <div style={{ fontSize: 13, fontWeight: 800, color: "#fff", marginBottom: 5, fontFamily: "'Sora', sans-serif" }}>Customer buys from Foodtown.</div>
                  <p style={{ fontSize: 11, color: "rgba(255,255,255,0.65)", lineHeight: 1.5, marginBottom: 9 }}>One tap from the recipe takes them straight to the product page to add it to their cart.</p>
                  <div style={{ background: "#fff", borderRadius: 10, padding: "9px 10px", display: "flex", gap: 9, alignItems: "center" }}>
                    <span style={{ fontSize: 22 }}>🍝</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 8, color: "#7C3AED", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>PASTOSA · A BROOKLYN TRADITION SINCE 1966</div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#1A0A2E" }}>Large Round Cheese Ravioli</div>
                      <div style={{ fontSize: 14, fontWeight: 800, color: "#22C55E" }}>$11.45</div>
                      <div style={{ fontSize: 8, color: "#9CA3AF" }}>12 count · 15oz · Refrigerated. Can be frozen. Made fresh daily.</div>
                    </div>
                  </div>
                  <button style={{ marginTop: 8, width: "100%", padding: "8px", borderRadius: 8, border: "none", background: "#EF4444", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" }}
                    onMouseEnter={e => e.currentTarget.style.filter = "brightness(1.1)"}
                    onMouseLeave={e => e.currentTarget.style.filter = "brightness(1)"}
                  >Add to Cart</button>
                </div>
              </HoverCard>

              <HoverCard style={{ borderRadius: 14, flex: 1, minHeight: 0 }}>
                <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 14, padding: "13px 14px", height: "100%" }}>
                  <div style={{ fontSize: 13, fontWeight: 800, color: "#fff", marginBottom: 10, fontFamily: "'Sora', sans-serif" }}>Why grocery stores love this.</div>
                  {[
                    { dot: "#3B82F6", label: "Increases product discovery", body: "Customers find products they wouldn't notice when featured in a recipe." },
                    { dot: "#A78BFA", label: "Inspires customers to cook", body: "A recipe gives shoppers a reason to buy — and 4 other ingredients with it." },
                    { dot: "#F59E0B", label: "Drives ingredient purchases", body: "Every recipe embeds a buy link. One recipe = multiple sales." },
                  ].map((b, i) => (
                    <div key={i} style={{ display: "flex", gap: 8, marginBottom: i < 2 ? 10 : 0, alignItems: "flex-start" }}>
                      <div style={{ width: 9, height: 9, borderRadius: "50%", background: b.dot, flexShrink: 0, marginTop: 3 }} />
                      <div>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#fff", marginBottom: 2 }}>{b.label}</div>
                        <div style={{ fontSize: 10, color: "rgba(255,255,255,0.6)", lineHeight: 1.45 }}>{b.body}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </HoverCard>

              <HoverCard style={{ borderRadius: 14, flexShrink: 0 }}>
                <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 14, padding: "12px 14px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 3, marginBottom: 10 }}>
                    {["Scan Product", "Get Recipe", "Buy Ingredients"].map((l, i) => (
                      <div key={l} style={{ display: "flex", alignItems: "center", flex: 1 }}>
                        <div style={{ flex: 1, background: "rgba(255,255,255,0.15)", borderRadius: 7, padding: "5px 3px", textAlign: "center", fontSize: 9, fontWeight: 700, color: "#fff" }}>{l}</div>
                        {i < 2 && <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", padding: "0 2px" }}>→</div>}
                      </div>
                    ))}
                  </div>
                  <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 9, padding: "9px 11px" }}>
                    <span style={{ fontSize: 12, fontStyle: "italic", color: "rgba(255,255,255,0.85)", fontWeight: 600, lineHeight: 1.5 }}>"Every product in your store could become a recipe."</span>
                  </div>
                </div>
              </HoverCard>

              <a
                href="https://fridgiesmalls.app/?campaign=pastosa-raviolis"
                target="_blank" rel="noopener noreferrer"
                style={{ display: "flex", alignItems: "center", justifyContent: "center", textAlign: "center", padding: "13px 0", borderRadius: 12, textDecoration: "none", background: "linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%)", color: "#fff", fontWeight: 800, fontSize: 13, fontFamily: "'DM Sans', sans-serif", boxShadow: "0 4px 20px rgba(37,99,235,0.5)", transition: "filter 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease", flexShrink: 0 }}
                onMouseEnter={e => { e.currentTarget.style.filter = "brightness(1.12)"; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 28px rgba(37,99,235,0.6)"; }}
                onMouseLeave={e => { e.currentTarget.style.filter = "brightness(1)"; e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "0 4px 20px rgba(37,99,235,0.5)"; }}
              >
                🚀 Launch Pastosa × Fridgie Smalls Activation
              </a>

            </div>
          </div>
        </ScaleWrapper>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
