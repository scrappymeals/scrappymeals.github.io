    }
    #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }

    .stage {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .iphone-bezel {
      border-radius: 52px;
      background: linear-gradient(145deg, #e8e8f0 0%, #c8c8dc 100%);
      box-shadow:
        inset 0 0 0 1.5px rgba(255,255,255,0.95),
        inset 0 2px 4px rgba(255,255,255,0.6),
        0 0 0 1px rgba(100,80,160,0.3),
        0 30px 80px rgba(0,0,0,0.55),
        0 8px 20px rgba(0,0,0,0.3);
      padding: 14px 10px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .iphone-notch {
      width: 68px; height: 5px;
      background: rgba(0,0,0,0.18);
      border-radius: 10px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .iphone-home {
      width: 90px; height: 4px;
      background: rgba(0,0,0,0.15);
      border-radius: 10px;
      margin-top: 10px;
      flex-shrink: 0;
    }

    .frame {
      border-radius: 38px;
      overflow: hidden;
      background: #5B21B6;
      position: relative;
      flex-shrink: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 40px 24px 28px;
      overflow: hidden;
    }

    .progress-bar {
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: rgba(255,255,255,0.15); z-index: 10;
    }
    .progress-fill {
      height: 100%; background: #fff;
      transition: width 0.35s ease;
      border-radius: 0 3px 3px 0;
    }

    .step-label {
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.14em; text-transform: uppercase;
      margin-bottom: 10px; flex-shrink: 0;
    }
    .headline {
      font-family: 'Sora', sans-serif; font-weight: 900;
      line-height: 1.1; color: #fff; letter-spacing: -0.02em;
      margin-bottom: 10px; flex-shrink: 0;
    }
    .headline em { font-style: normal; color: #a78bfa; }
    .body-text {
      color: rgba(255,255,255,0.75); line-height: 1.6;
      margin-bottom: 14px; flex-shrink: 0;
    }
    .tag {
      display: inline-block;
      background: rgba(167,139,250,0.2);
      border: 1px solid rgba(167,139,250,0.4);
      border-radius: 20px; padding: 3px 10px;
      font-size: 10px; font-weight: 700; color: #c4b5fd;
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 10px; flex-shrink: 0;
      align-self: flex-start;
    }

    .fridgie-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; min-height: 0; margin: 6px 0;
    }
    .fridgie-glow {
      position: absolute; width: 70%; height: 70%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.55) 0%, transparent 70%);
    }
    .fridgie-wrap img {
      width: 95%; height: 100%; object-fit: contain;
      position: relative; z-index: 1;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,0.4));
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 16px; padding: 14px 16px; margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
    }
    .card-row { display: flex; align-items: center; gap: 12px; }
    .card-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-title { font-weight: 700; color: #fff; margin-bottom: 2px; }
    .card-sub   { color: rgba(255,255,255,0.6); line-height: 1.4; }

    .product-card {
      background: #fff; border-radius: 16px; padding: 14px;
      display: flex; gap: 12px; align-items: center;
      margin-bottom: 12px; flex-shrink: 0;
    }
    .product-brand { font-weight: 700; color: #7C3AED; text-transform: uppercase; letter-spacing: 0.06em; }
    .product-name  { font-weight: 800; color: #1A0A2E; margin: 2px 0; }
    .product-price { font-weight: 900; color: #22C55E; }
    .product-note  { color: #9CA3AF; }

    .qr-area {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px;
      background: rgba(255,255,255,0.07); border-radius: 18px;
      margin-bottom: 12px; position: relative; overflow: hidden;
    }
    .qr-box {
      border: 3px solid #7C3AED; border-radius: 12px;
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 4px; padding: 8px; background: #fff;
      position: relative; overflow: hidden;
    }
    .qr-dot { border-radius: 2px; }
    .scan-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #7C3AED, transparent);
      animation: scan 1.8s ease-in-out infinite;
    }
    @keyframes scan {
      0%   { top: 8px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 8px); opacity: 0; }
    }

    .build-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    .spinner {
      border-radius: 50%;
      border-top-color: #a78bfa;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .emoji-row { display: flex; }
    .emoji-row span { display: inline-block; animation: bob 0.7s ease-in-out infinite alternate; }
    .emoji-row span:nth-child(1){animation-delay:0s}
    .emoji-row span:nth-child(2){animation-delay:.1s}
    .emoji-row span:nth-child(3){animation-delay:.2s}
    .emoji-row span:nth-child(4){animation-delay:.3s}
    .emoji-row span:nth-child(5){animation-delay:.4s}
    @keyframes bob { from{transform:translateY(0)} to{transform:translateY(-7px)} }

    .recipe-section {
      background: rgba(255,255,255,0.07); border-radius: 14px;
      padding: 12px 14px; margin-bottom: 10px; flex-shrink: 0;
    }
    .recipe-label { font-weight: 700; color: #a78bfa; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .recipe-row {
      display: flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.85); padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .recipe-row:last-child { border-bottom: none; }
    .step-num {
      width: 20px; height: 20px; border-radius: 50%;
      background: #7C3AED; color: #fff; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .bullet { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; flex-shrink: 0; }
    .bullet-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .bullet-title { font-weight: 700; color: #fff; margin-bottom: 1px; }
    .bullet-body  { color: rgba(255,255,255,0.6); line-height: 1.4; }

    .flow { display: flex; align-items: center; justify-content: center; gap: 4px; margin: 10px 0; flex-shrink: 0; }
    .flow-step { background: rgba(255,255,255,0.12); border-radius: 8px; padding: 8px 6px; text-align: center; font-weight: 700; color: #fff; flex: 1; }
    .flow-arrow { color: rgba(255,255,255,0.4); flex-shrink: 0; }

    .spacer { flex: 1; }

    .btn-continue {
      padding: 16px; border-radius: 14px; border: none;
      background: #22C55E; color: #fff;
      font-family: 'DM Sans', sans-serif; font-weight: 800;
      cursor: pointer; width: 100%;
      box-shadow: 0 5px 20px rgba(34,197,94,0.4);
      transition: transform 0.15s ease;
      flex-shrink: 0;
    }
    .btn-continue:active { transform: scale(0.97); }

    .btn-launch {
      padding: 16px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, #2563EB, #1D4ED8); color: #fff;
      font-family: 'DM Sans', sans-serif; font-weight: 800;
      cursor: pointer; width: 100%; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 5px 20px rgba(37,99,235,0.45);
      margin-bottom: 10px; flex-shrink: 0;
    }

    .btn-replay {
      padding: 14px; border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      background: transparent; color: #fff;
      font-family: 'DM Sans', sans-serif; font-weight: 700;
      cursor: pointer; width: 100%;
      flex-shrink: 0;
    }

    .confetti { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .confetti span {
      position: absolute; border-radius: 50%;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%  { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100%{ transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    .slide > * { position: relative; z-index: 1; }
    .confetti { z-index: 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, createElement: h } = React;

function Confetti() {
  const dots = [
    {l:"8%",c:"#a78bfa",s:9,d:"2.8s",dl:"0s"},{l:"22%",c:"#22C55E",s:7,d:"3.2s",dl:"0.4s"},
    {l:"38%",c:"#F59E0B",s:11,d:"2.5s",dl:"0.8s"},{l:"54%",c:"#EC4899",s:8,d:"3.5s",dl:"0.2s"},
    {l:"68%",c:"#60A5FA",s:10,d:"2.9s",dl:"0.6s"},{l:"82%",c:"#a78bfa",s:7,d:"3.1s",dl:"1s"},
    {l:"15%",c:"#22C55E",s:9,d:"2.6s",dl:"1.2s"},{l:"60%",c:"#F59E0B",s:8,d:"3.3s",dl:"0.3s"},
    {l:"76%",c:"#EC4899",s:11,d:"2.7s",dl:"0.9s"},{l:"91%",c:"#60A5FA",s:7,d:"3.0s",dl:"0.5s"},
  ];
  return h("div",{className:"confetti"},
    ...dots.map((d,i)=>h("span",{key:i,style:{left:d.l,background:d.c,width:d.s,height:d.s,animationDuration:d.d,animationDelay:d.dl}}))
  );
}

function QRVisual({sz}) {
  return h("div",{className:"qr-area"},
    h("div",{style:{fontSize:sz*0.12}},"📷"),
    h("div",{className:"qr-box",style:{width:sz*0.32,height:sz*0.32}},
      ...[...Array(9)].map((_,i)=>h("div",{key:i,className:"qr-dot",style:{background:i%3===0||i===4?"#7C3AED":"#DDD6FE"}})),
      h("div",{className:"scan-line"})
    ),
    h("div",{style:{fontSize:sz*0.035,color:"#a78bfa",fontWeight:700,letterSpacing:"0.1em"}},"SCAN QR CODE")
  );
}

function BuildVisual({sz}) {
  return h("div",{className:"build-area"},
    h("div",{className:"spinner",style:{width:sz*0.14,height:sz*0.14,border:`${sz*0.009}px solid rgba(255,255,255,0.15)`,borderTopColor:"#a78bfa"}}),
    h("div",{className:"emoji-row",style:{gap:sz*0.025}},

function makeSlides(sz, back) {
  const hs = sz * 0.075;  // headline font
  const bs = sz * 0.038;  // body font
  const ls = sz * 0.026;  // small label
  const cs = sz * 0.042;  // card title
  const ss = sz * 0.032;  // card sub

  const go_btn = (go, label="Continue →") =>
    h("button",{className:"btn-continue",onClick:go,style:{fontSize:sz*0.042}},label);

  const back_btn = () =>
    h("button",{onClick:back,style:{
      position:"absolute",top:sz*0.04,left:"50%",transform:"translateX(-50%)",
      background:"transparent",border:"none",
      color:"rgba(255,255,255,0.45)",fontWeight:400,fontSize:sz*0.038,
      cursor:"pointer",zIndex:20,lineHeight:1,padding:`${sz*0.01}px`,
    }},"‹");

  return [
    // 1 INTRO
    (go) => h("div",{className:"slide",style:{background:"linear-gradient(160deg,#6D28D9 0%,#db5cff 50%,#4C1D95 100%)"}},
      h("div",{className:"step-label",style:{fontSize:ls}},"FOODTOWN CONCEPT DEMO"),
      h("div",{className:"tag",style:{fontSize:ls}},"Powered by FridgieSmalls"),
      h("h1",{className:"headline",style:{fontSize:hs}},"Turn every ",h("em",null,"product")," into a recipe."),
      h("p",{className:"body-text",style:{fontSize:bs}},"A simple shopper journey powered by FridgieSmalls. Here's how it works."),
      h("div",{className:"fridgie-wrap"},
        h("div",{className:"fridgie-glow"}),
        h("img",{src:"fridgieDemo.png",alt:"Fridgie"})

      go_btn(go,"Let's Go →")
    ),

    // 2 SCAN
    (go) => h("div",{className:"slide",style:{background:"linear-gradient(160deg,#5B21B6 0%,#db5cff 50%,#3B1494 100%)"}},
      back_btn(),
      h("div",{className:"step-label",style:{fontSize:ls}},"STEP 1 OF 5"),
      h("h1",{className:"headline",style:{fontSize:hs}},"Shopper scans a product."),
      h("p",{className:"body-text",style:{fontSize:bs}},"A QR code on the shelf opens a recipe instantly. No app. No sign up. Just point and scan."),
      h(QRVisual,{sz}),
      go_btn(go)
    ),

    // 3 BUILD
    (go) => h("div",{className:"slide",style:{background:"linear-gradient(160deg,#4C1D95 0%,#db5cff 50%,#5B21B6 100%)"}},
      back_btn(),
      h("div",{className:"step-label",style:{fontSize:ls}},"STEP 2 OF 5"),

      h("p",{className:"body-text",style:{fontSize:bs}},"The AI grabs the scanned product and builds a full recipe around it in seconds."),
      h(BuildVisual,{sz}),
      h("div",{className:"card",style:{marginTop:8}},
        h("div",{className:"card-row"},
          h("div",{className:"card-icon",style:{fontSize:sz*0.055}},"🧠"),
          h("div",null,
            h("div",{className:"card-title",style:{fontSize:cs}},"Smart ingredient pairing"),
            h("div",{className:"card-sub",style:{fontSize:ss}},"Pantry staples + flavor profiles matched automatically.")

        )
      ),
      go_btn(go)
    ),

    // 4 RECIPE + SAVED (combined)
    (go) => h("div",{className:"slide",style:{background:"linear-gradient(160deg,#5B21B6 0%,#db5cff 50%,#4C1D95 100%)",overflowY:"auto"}},
      back_btn(),
      h("div",{className:"step-label",style:{fontSize:ls}},"STEP 3 OF 5"),

          h("div",{className:"recipe-row",key:i,style:{fontSize:ss}},

      h("div",{className:"product-card"},
        h("div",{style:{fontSize:sz*0.1}},"🍝"),

          h("div",{className:"product-brand",style:{fontSize:ls*0.85}},"PASTOSA · BROOKLYN SINCE 1966"),

      h("div",{className:"card",style:{marginBottom:10}},

          h("div",{className:"flow-step",key:"s"+i,style:{fontSize:ss}},l),
          i<arr.length-1&&h("div",{className:"flow-arrow",key:"a"+i,style:{fontSize:cs}},"→")

      ),
      h("div",{className:"spacer"}),
      h("img",{src:"fridgieDodgersSmall.png",alt:"Fridgie",style:{
        width:"88%",maxHeight:sz*0.22,objectFit:"contain",

        filter:"drop-shadow(0 2px 12px rgba(0,0,0,0.35))",
        opacity:0.97,
      }}),
      go_btn(go,"See the Demo →")
    ),

    // 7 FINALE
    (go) => h("div",{className:"slide",style:{background:"linear-gradient(160deg,#5B21B6 0%,#db5cff 50%,#3B1494 100%)"}},
      h(Confetti),
      h("div",{className:"step-label",style:{fontSize:ls}},"THAT'S THE LOOP ✅"),
      h("h1",{className:"headline",style:{fontSize:hs}},"Every product.",h("br",null),h("em",null,"Every recipe."),h("br",null),"Every sale."),
      h("p",{className:"body-text",style:{fontSize:bs}},"FridgieSmalls turns a shelf scan into a recipe with a Foodtown buy button — embedded forever."),

function App() {
  const [current, setCurrent] = useState(0);
  const [dims, setDims] = useState({w: window.innerWidth, h: window.innerHeight});

  useEffect(() => {
    const fn = () => setDims({w: window.innerWidth, h: window.innerHeight});
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);

  const go = () => setCurrent(c => (c + 1) % 7);
  const progress = (current / 6) * 100;

  // Calculate frame size to fit inside viewport with bezel
  // bezel adds: 14+18 vertical padding + 8+10 notch/home = 50px height, 10+10=20px width
  const bezelPadH = 8, bezelPadW = 6;
  const maxFH = dims.h - 24 - bezelPadH;
  const maxFW = dims.w - 16 - bezelPadW;
  let fH = maxFH;
  let fW = fH * 9 / 16;
  if (fW > maxFW) { fW = maxFW; fH = fW * 16 / 9; }
  fW = Math.floor(fW);
  fH = Math.floor(fH);

  const back = () => setCurrent(c => Math.max(0, c - 1));
  const SLIDES = makeSlides(fW, back);
